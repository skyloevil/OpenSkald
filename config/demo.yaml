environment: development
log_level: INFO

llm:
  provider: demo
  base_url: https://api.deepseek.com
  api_key_env: DEMO_LLM_API_KEY
  model: demo-local-deterministic
  timeout_seconds: 10

openviking:
  knowledge_base_path: ./examples/knowledge
  include_globs:
    - "**/*.md"
  max_articles_per_run: 5

scheduler: {}

publishers:
  blog:
    enabled: true
    account_id: ./data/demo-blog
    dry_run: false
    credentials_env: null
  wechat:
    enabled: false
    account_id: demo-wechat
    dry_run: true
    credentials_env: WECHAT_PUBLISHER_CREDENTIALS
  x:
    enabled: false
    account_id: demo-x
    dry_run: true
    credentials_env: X_PUBLISHER_CREDENTIALS
  xiaohongshu:
    enabled: false
    account_id: demo-xhs
    dry_run: true
    credentials_env: XIAOHONGSHU_PUBLISHER_CREDENTIALS

agent_llm: {}

agent:
  mode: single
  workspace_id: open-skald
  reflection:
    enabled: true
    min_confidence_for_skill_proposal: 0.7
  collaboration:
    enabled: false
    max_agent_turns: 8
    require_review_agent: true

review:
  require_human_approval: true
  storage_path: ./data/demo-review.jsonl

memory:
  storage_path: ./data/demo-memory.jsonl
  skill_proposals_path: ./data/demo-skill-proposals.jsonl
  article_index_path: ./data/demo-articles.jsonl
